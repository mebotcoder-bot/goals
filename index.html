<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goals — Suited Productions</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#07080f;--s1:#0d0f1a;--s2:#131520;--s3:#191c2a;
  --b1:#1e2130;--b2:#252840;--text:#dde0ff;--muted:#4a4d6a;--dim:#2a2d3f;
  --gold:#e8b84b;--gold2:#ffd166;--green:#3dd68c;--blue:#5b9bd5;
  --red:#e05c7a;--purple:#9b72d4;--orange:#e0945c;--teal:#3dd4d4;
  --mentor:#a78bfa;--mentor2:#c4b5fd;--comm:#38bdf8;--comm2:#7dd3fc;
}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:24px 16px 120px;}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:20px;}
.loading-logo{font-family:'Clash Display',sans-serif;font-size:42px;font-weight:700;letter-spacing:-2px;color:var(--gold2);}
.loading-logo span{color:var(--text);}
.spinner{width:28px;height:28px;border:2px solid var(--b1);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-sub{font-size:9px;color:var(--muted);letter-spacing:3px;}
.auth{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:998;padding:24px;}
.auth.show{display:flex;}
.auth-logo{font-family:'Clash Display',sans-serif;font-size:42px;font-weight:700;letter-spacing:-2px;color:var(--gold2);margin-bottom:4px;}
.auth-logo span{color:var(--text);}
.auth-tagline{font-size:9px;color:var(--muted);letter-spacing:3px;margin-bottom:36px;}
.auth-box{background:var(--s2);border:1px solid var(--b1);border-radius:16px;padding:24px;width:100%;max-width:340px;}
.auth-label{font-size:9px;color:var(--muted);letter-spacing:3px;text-align:center;margin-bottom:14px;}
.auth-inp{width:100%;background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px 16px;color:var(--text);font-family:'Space Mono',monospace;font-size:15px;outline:none;text-align:center;letter-spacing:2px;transition:border-color 0.2s;margin-bottom:10px;}
.auth-inp:focus{border-color:var(--gold);}
.auth-inp::placeholder{color:var(--dim);font-size:11px;letter-spacing:1px;}
.auth-btn{width:100%;background:var(--gold);border:none;border-radius:10px;padding:14px;color:var(--bg);font-family:'Clash Display',sans-serif;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:background 0.2s;}
.auth-btn:hover{background:var(--gold2);}
.auth-err{font-size:9px;color:var(--red);text-align:center;margin-top:10px;min-height:14px;letter-spacing:1px;}
.auth-hint{font-size:8px;color:var(--muted);text-align:center;margin-top:8px;line-height:1.8;}
.header{margin-bottom:20px;animation:fadeUp 0.4s ease both;}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;}
.logo{font-family:'Clash Display',sans-serif;font-size:38px;font-weight:700;letter-spacing:-2px;line-height:1;}
.logo span{color:var(--gold2);}
.user-area{display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-top:4px;}
.user-name{font-size:10px;color:var(--gold);letter-spacing:1px;background:rgba(232,184,75,0.08);border:1px solid rgba(232,184,75,0.2);padding:3px 10px;border-radius:20px;}
.admin-badge{font-size:8px;color:var(--red);background:rgba(224,92,122,0.1);border:1px solid rgba(224,92,122,0.2);padding:2px 8px;border-radius:20px;letter-spacing:1px;}
.btn-out{background:none;border:1px solid var(--b2);border-radius:6px;padding:3px 8px;color:var(--muted);font-family:'Space Mono',monospace;font-size:8px;cursor:pointer;transition:all 0.2s;letter-spacing:1px;}
.btn-out:hover{border-color:var(--red);color:var(--red);}
.header-sub{font-size:9px;color:var(--muted);margin-top:6px;letter-spacing:2px;}
.sync{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:7px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0;}
.sync-dot.syncing{background:var(--gold);box-shadow:0 0 6px var(--gold);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.2;}}
.sync-txt{font-size:8px;color:var(--muted);letter-spacing:2px;}
.nav{display:flex;gap:2px;margin-bottom:22px;background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:4px;animation:fadeUp 0.4s 0.06s ease both;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex:1;min-width:fit-content;padding:8px 6px;background:none;border:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:8px;font-weight:700;cursor:pointer;border-radius:9px;transition:all 0.2s;letter-spacing:0.3px;white-space:nowrap;}
.nav-btn.active{background:var(--s3);color:var(--text);border:1px solid var(--b2);}
.page{display:none;animation:fadeUp 0.3s ease both;}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.sec-label{font-size:8px;letter-spacing:3px;color:var(--muted);margin-bottom:10px;padding-left:2px;}
.bal-card{background:var(--s2);border:1px solid var(--b1);border-radius:16px;padding:22px;margin-bottom:18px;position:relative;overflow:hidden;}
.bal-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(232,184,75,0.08),transparent 70%);pointer-events:none;}
.bal-label{font-size:8px;color:var(--muted);letter-spacing:3px;margin-bottom:6px;}
.bal-amt{font-family:'Clash Display',sans-serif;font-size:44px;font-weight:700;color:var(--gold2);line-height:1;margin-bottom:16px;letter-spacing:-2px;}
.bal-amt em{font-size:18px;color:var(--gold);font-style:normal;font-family:'Space Mono',monospace;font-weight:400;}
.inp-row{display:flex;gap:8px;}
.money-inp{flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Space Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
.money-inp:focus{border-color:var(--gold);}
.btn-gold{background:var(--gold);border:none;border-radius:8px;padding:10px 18px;color:var(--bg);font-family:'Clash Display',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:background 0.2s;white-space:nowrap;}
.btn-gold:hover{background:var(--gold2);}
.cat-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.cat-row::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;padding:5px 12px;background:none;border:1px solid var(--b1);border-radius:20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;transition:all 0.2s;}
.cat-btn.active,.cat-btn:hover{border-color:var(--b2);color:var(--text);background:rgba(255,255,255,0.03);}
.afford-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.afford-card{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:14px;position:relative;overflow:hidden;transition:all 0.2s;cursor:pointer;}
.afford-card:hover{border-color:var(--b2);transform:translateY(-1px);}
.afford-card.yes{border-color:rgba(61,214,140,0.2);}
.afford-card.no{opacity:0.35;}
.afford-card.custom{border-style:dashed;}
.green-dot{width:6px;height:6px;border-radius:50%;background:var(--green);position:absolute;top:10px;right:10px;box-shadow:0 0 6px var(--green);}
.buy-badge{position:absolute;top:8px;right:8px;background:rgba(232,184,75,0.15);border:1px solid rgba(232,184,75,0.3);border-radius:4px;padding:2px 5px;font-size:7px;color:var(--gold);letter-spacing:1px;}
.af-icon{font-size:24px;margin-bottom:6px;}
.af-name{font-size:11px;font-weight:700;margin-bottom:2px;line-height:1.2;font-family:'Clash Display',sans-serif;}
.af-price{font-size:9px;color:var(--muted);}
.af-del{position:absolute;bottom:8px;right:8px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;display:none;transition:color 0.2s;}
.afford-card.custom:hover .af-del{display:block;}
.af-del:hover{color:var(--red);}
.form-card{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:16px;margin-bottom:18px;}
.form-title{font-size:8px;color:var(--muted);letter-spacing:3px;margin-bottom:12px;}
.form-row{display:flex;gap:8px;margin-bottom:8px;}
.form-row:last-child{margin-bottom:0;}
.txt-inp{flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s;}
.txt-inp:focus{border-color:var(--b2);}
.txt-inp::placeholder{color:var(--dim);}
select.txt-inp{cursor:pointer;}
.btn-add{background:var(--s1);border:1px solid var(--b2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Clash Display',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.btn-add:hover{background:var(--b1);}
.save-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.save-card{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:16px;animation:fadeUp 0.3s ease both;}
.save-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.save-name{font-size:14px;font-weight:700;font-family:'Clash Display',sans-serif;}
.save-target{font-size:11px;color:var(--gold);}
.save-bar-bg{height:4px;background:var(--dim);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.save-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 1s cubic-bezier(0.4,0,0.2,1);}
.save-bar.done{background:linear-gradient(90deg,var(--green),#6ee7b7);}
.save-bot{display:flex;justify-content:space-between;align-items:center;}
.save-prog{font-size:9px;color:var(--muted);}
.save-acts{display:flex;gap:6px;}
.btn-sm{background:var(--s1);border:1px solid var(--b1);border-radius:6px;padding:4px 10px;color:var(--text);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;transition:all 0.2s;}
.btn-sm:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm.del:hover{border-color:var(--red);color:var(--red);}
.goals-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.goal-card{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:13px 15px;display:flex;align-items:flex-start;gap:11px;animation:fadeUp 0.3s ease both;transition:opacity 0.3s;}
.goal-card.done{opacity:0.32;}
.goal-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--b2);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all 0.2s;}
.goal-check.on{background:var(--green);border-color:var(--green);color:#fff;}
.goal-info{flex:1;min-width:0;}
.goal-title{font-size:12px;font-weight:700;font-family:'Clash Display',sans-serif;margin-bottom:4px;line-height:1.3;word-break:break-word;}
.goal-card.done .goal-title{text-decoration:line-through;}
.goal-tag{font-size:8px;letter-spacing:0.5px;padding:2px 7px;border-radius:4px;}
.tg{background:rgba(91,155,213,0.1);color:var(--blue);}
.ta{background:rgba(224,148,92,0.1);color:var(--orange);}
.tc{background:rgba(61,212,212,0.1);color:var(--teal);}
.tf{background:rgba(61,214,140,0.1);color:var(--green);}
.tp{background:rgba(224,92,122,0.1);color:var(--red);}
.tl{background:rgba(155,114,212,0.1);color:var(--purple);}
.goal-actions{display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.goal-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;padding:0 2px;transition:color 0.2s;line-height:1;}
.goal-del:hover{color:var(--red);}
.btn-tut{background:none;border:1px solid var(--b1);border-radius:5px;padding:3px 6px;color:var(--muted);font-family:'Space Mono',monospace;font-size:7px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-tut:hover{border-color:var(--purple);color:var(--purple);}
.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:5px 12px;background:none;border:1px solid var(--b1);border-radius:20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;transition:all 0.2s;}
.filter-btn.active,.filter-btn:hover{border-color:var(--b2);color:var(--text);background:rgba(255,255,255,0.03);}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;}
.stat{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px;text-align:center;}
.stat-n{font-family:'Clash Display',sans-serif;font-size:26px;font-weight:700;color:var(--gold2);line-height:1;margin-bottom:3px;}
.stat-l{font-size:8px;color:var(--muted);letter-spacing:1px;}
.tut-panel{background:var(--s2);border:1px solid rgba(155,114,212,0.3);border-radius:12px;padding:16px;margin-bottom:12px;animation:fadeUp 0.3s ease both;}
.tut-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.tut-title{font-size:10px;color:var(--purple);letter-spacing:2px;}
.tut-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;}
.tut-for{font-size:11px;font-weight:700;font-family:'Clash Display',sans-serif;margin-bottom:10px;}
.tut-list{display:flex;flex-direction:column;gap:8px;}
.tut-item{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:block;}
.tut-item:hover{border-color:var(--purple);transform:translateX(3px);}
.tut-item-title{font-size:11px;color:var(--text);font-weight:700;margin-bottom:3px;line-height:1.3;font-family:'Clash Display',sans-serif;}
.tut-item-src{font-size:8px;color:var(--muted);letter-spacing:1px;}
.mentor-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:16px;background:var(--s2);border:1px solid var(--b1);border-radius:14px;}
.mentor-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--mentor),var(--purple));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 0 16px rgba(167,139,250,0.3);}
.mentor-info{flex:1;}
.mentor-name{font-family:'Clash Display',sans-serif;font-size:16px;font-weight:700;color:var(--mentor2);}
.mentor-status{font-size:8px;color:var(--muted);letter-spacing:2px;margin-top:2px;}
.chat-area{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;max-height:380px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;padding-right:4px;}
.chat-area::-webkit-scrollbar{width:3px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
.msg{display:flex;gap:8px;animation:fadeUp 0.3s ease both;}
.msg.user{flex-direction:row-reverse;}
.msg-bubble{max-width:80%;padding:10px 14px;border-radius:12px;font-size:11px;line-height:1.6;}
.msg.ai .msg-bubble{background:var(--s3);border:1px solid var(--b1);border-radius:4px 12px 12px 12px;color:var(--text);}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--mentor),var(--purple));color:#fff;border-radius:12px 4px 12px 12px;}
.msg-icon{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.msg.ai .msg-icon{background:linear-gradient(135deg,var(--mentor),var(--purple));}
.msg.user .msg-icon{background:var(--s3);border:1px solid var(--b2);}
.typing-indicator{display:flex;align-items:center;gap:4px;padding:10px 14px;background:var(--s3);border:1px solid var(--b1);border-radius:4px 12px 12px 12px;width:fit-content;}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--mentor);animation:tdot 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes tdot{0%,100%{opacity:0.2;transform:translateY(0);}50%{opacity:1;transform:translateY(-3px);}}
.chat-inp-row{display:flex;gap:8px;}
.chat-inp{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s;}
.chat-inp:focus{border-color:var(--mentor);}
.chat-inp::placeholder{color:var(--dim);font-size:10px;}
.btn-send{background:linear-gradient(135deg,var(--mentor),var(--purple));border:none;border-radius:10px;padding:11px 16px;color:#fff;font-size:16px;cursor:pointer;transition:opacity 0.2s;flex-shrink:0;}
.btn-send:hover{opacity:0.85;}
.btn-send:disabled{opacity:0.4;cursor:not-allowed;}
.quick-prompts{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.quick-prompts::-webkit-scrollbar{display:none;}
.quick-btn{flex-shrink:0;padding:5px 12px;background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);border-radius:20px;color:var(--mentor2);font-family:'Space Mono',monospace;font-size:8px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.quick-btn:hover{background:rgba(167,139,250,0.15);}
.comm-tabs{display:flex;gap:6px;margin-bottom:16px;}
.comm-tab{flex:1;padding:9px;background:none;border:1px solid var(--b1);border-radius:8px;color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;transition:all 0.2s;text-align:center;}
.comm-tab.active{background:var(--s3);border-color:var(--comm);color:var(--comm);}
.comm-section{display:none;}
.comm-section.active{display:block;}
.feed-post-box{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:14px;margin-bottom:16px;}
.feed-post-title{font-size:8px;color:var(--muted);letter-spacing:3px;margin-bottom:10px;}
.feed-textarea{width:100%;background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;outline:none;resize:none;height:72px;transition:border-color 0.2s;margin-bottom:8px;}
.feed-textarea:focus{border-color:var(--comm);}
.feed-textarea::placeholder{color:var(--dim);font-size:10px;}
.feed-post-row{display:flex;gap:8px;}
.feed-goal-sel{flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:9px 10px;color:var(--text);font-family:'Space Mono',monospace;font-size:10px;outline:none;cursor:pointer;}
.btn-post{background:var(--comm);border:none;border-radius:8px;padding:9px 16px;color:var(--bg);font-family:'Clash Display',sans-serif;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;}
.feed-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.feed-card{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:14px;animation:fadeUp 0.3s ease both;}
.feed-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.feed-user{font-size:10px;color:v
